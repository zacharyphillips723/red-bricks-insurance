command:
  - uvicorn
  - main:app
  - --host=0.0.0.0
  - --port=8000

# SQL_WAREHOUSE_ID and UC_CATALOG default to "auto" (runtime auto-detection).
# When deployed via `databricks bundle deploy`, the DAB resource config
# (resources/app_fwa.yml) overrides with resolved values. Catalog is always red_bricks_insurance.
env:
  - name: LAKEBASE_PROJECT_ID
    value: red-bricks-insurance
  - name: LAKEBASE_DATABASE_NAME
    value: fwa_cases
  - name: LAKEBASE_BRANCH
    value: production
  - name: GENIE_SPACE_ID
    value: auto
  - name: SQL_WAREHOUSE_ID
    value: auto
  - name: LLM_ENDPOINT
    value: databricks-llama-4-maverick
  - name: UC_CATALOG
    value: auto
  - name: UC_SCHEMA
    value: fwa
  - name: FWA_MODEL_ENDPOINT
    value: fwa-fraud-scorer
