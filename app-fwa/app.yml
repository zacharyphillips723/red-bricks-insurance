command:
  - uvicorn
  - main:app
  - --host=0.0.0.0
  - --port=8000

# SQL_WAREHOUSE_ID and UC_CATALOG default to "auto" (runtime auto-detection).
# When deployed via `databricks bundle deploy`, the DAB resource config
# (resources/app_fwa.yml) overrides with ${var.warehouse_id} and ${var.catalog}.
env:
  - name: LAKEBASE_INSTANCE_NAME
    value: fwa-investigations
  - name: LAKEBASE_DATABASE_NAME
    value: fwa_cases
  - name: SQL_WAREHOUSE_ID
    value: auto
  - name: LLM_ENDPOINT
    value: databricks-llama-4-maverick
  - name: UC_CATALOG
    value: auto
  - name: UC_SCHEMA
    value: fwa
  - name: FWA_MODEL_ENDPOINT
    value: fwa-fraud-scorer
