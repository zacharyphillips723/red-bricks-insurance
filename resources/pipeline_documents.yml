resources:
  pipelines:
    documents_pipeline:
      name: "[${bundle.target}] Red Bricks — Documents Pipeline"
      catalog: ${var.catalog}
      target: documents
      configuration:
        source_volume: ${var.source_volume}
      libraries:
        - file:
            path: ../src/pipelines/documents/bronze.sql
        - file:
            path: ../src/pipelines/documents/silver.sql
        - file:
            path: ../src/pipelines/documents/gold.sql
      channel: PREVIEW
      serverless: true
      development: true
