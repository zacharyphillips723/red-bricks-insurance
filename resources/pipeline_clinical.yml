resources:
  pipelines:
    clinical_pipeline:
      name: "[${bundle.target}] Red Bricks — Clinical Pipeline"
      catalog: red_bricks_insurance
      target: clinical
      configuration:
        source_volume: ${var.source_volume}
        catalog: red_bricks_insurance
        schema: clinical
      libraries:
        - file:
            path: ../src/pipelines/clinical/bronze.sql
        - file:
            path: ../src/pipelines/clinical/silver.sql
        - file:
            path: ../src/pipelines/clinical/gold.sql
      channel: PREVIEW
      serverless: true
      development: true
