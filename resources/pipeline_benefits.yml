resources:
  pipelines:
    benefits_pipeline:
      name: "[${bundle.target}] Red Bricks — Benefits Pipeline"
      catalog: ${var.catalog}
      target: benefits
      configuration:
        source_volume: ${var.source_volume}
        catalog: ${var.catalog}
      libraries:
        - file:
            path: ../src/pipelines/benefits/bronze.sql
        - file:
            path: ../src/pipelines/benefits/silver.sql
        - file:
            path: ../src/pipelines/benefits/gold.sql
      channel: PREVIEW
      serverless: true
      development: true
