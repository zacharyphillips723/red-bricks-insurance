resources:
  pipelines:
    underwriting_pipeline:
      name: "[${bundle.target}] Red Bricks — Underwriting Pipeline"
      catalog: red_bricks_insurance
      target: underwriting
      configuration:
        source_volume: ${var.source_volume}
      libraries:
        - file:
            path: ../src/pipelines/underwriting/bronze.sql
        - file:
            path: ../src/pipelines/underwriting/silver.sql
        - file:
            path: ../src/pipelines/underwriting/gold.sql
      channel: PREVIEW
      serverless: true
      development: true
