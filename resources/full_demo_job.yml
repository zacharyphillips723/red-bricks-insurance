resources:
  jobs:
    red_bricks_full_demo:
      name: "[${bundle.target}] Red Bricks Insurance — Full Demo Pipeline"

      tasks:
        # Step 0: Set up Lakebase databases + DDL (runs immediately, no dependencies)
        # Instances are created by DAB Terraform; this creates the PG databases inside them
        - task_key: setup_lakebase
          notebook_task:
            notebook_path: ../src/notebooks/setup_lakebase.py
            base_parameters:
              catalog: ${var.catalog}
              lakebase_project_id: ${var.lakebase_project_id}
          environment_key: lakebase_env

        # Step 1a: Run Synthea patient generation (serverless — requires Java 17+)
        # Serverless environment v5+ ships Java 17. The notebook auto-detects and
        # fails with a clear message if the Java version is too old.
        - task_key: synthea_generation
          notebook_task:
            notebook_path: ../src/notebooks/run_synthea_generation.py
            base_parameters:
              catalog: ${var.catalog}
              num_patients: ${var.num_patients}

        # Step 1b: Generate synthetic insurance data (reads Synthea demographics)
        - task_key: data_generation
          depends_on:
            - task_key: synthea_generation
          notebook_task:
            notebook_path: ../src/notebooks/run_data_generation.py
            base_parameters:
              catalog: ${var.catalog}


        # Step 2: Domain pipelines (run in parallel after data generation)
        - task_key: members_pipeline
          depends_on:
            - task_key: data_generation
          pipeline_task:
            pipeline_id: ${resources.pipelines.members_pipeline.id}
            full_refresh: true

        - task_key: providers_pipeline
          depends_on:
            - task_key: data_generation
          pipeline_task:
            pipeline_id: ${resources.pipelines.providers_pipeline.id}
            full_refresh: true

        - task_key: claims_pipeline
          depends_on:
            - task_key: data_generation
          pipeline_task:
            pipeline_id: ${resources.pipelines.claims_pipeline.id}
            full_refresh: true

        - task_key: underwriting_pipeline
          depends_on:
            - task_key: data_generation
          pipeline_task:
            pipeline_id: ${resources.pipelines.underwriting_pipeline.id}
            full_refresh: true

        - task_key: risk_adjustment_pipeline
          depends_on:
            - task_key: data_generation
          pipeline_task:
            pipeline_id: ${resources.pipelines.risk_adjustment_pipeline.id}
            full_refresh: true

        - task_key: benefits_pipeline
          depends_on:
            - task_key: data_generation
            - task_key: claims_pipeline
            - task_key: risk_adjustment_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.benefits_pipeline.id}
            full_refresh: true

        # Step 2b: Documents pipeline (depends on data generation)
        - task_key: documents_pipeline
          depends_on:
            - task_key: data_generation
          pipeline_task:
            pipeline_id: ${resources.pipelines.documents_pipeline.id}
            full_refresh: true

        # Step 2c: Build member months (depends on members pipeline for silver_enrollment)
        - task_key: build_member_months
          depends_on:
            - task_key: members_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/build_member_months.py
            base_parameters:
              catalog: ${var.catalog}


        # Step 2d: Synthea clinical data pipeline
        # Synthea generation (Step 1a) → data_generation reads demographics
        # parse_fhir_with_dbignite depends on BOTH synthea_generation AND data_generation
        - task_key: parse_fhir_with_dbignite
          depends_on:
            - task_key: synthea_generation
            - task_key: data_generation
          notebook_task:
            notebook_path: ../src/notebooks/parse_fhir_with_dbignite.py
            base_parameters:
              catalog: ${var.catalog}


        - task_key: clinical_pipeline
          depends_on:
            - task_key: parse_fhir_with_dbignite
          pipeline_task:
            pipeline_id: ${resources.pipelines.clinical_pipeline.id}
            full_refresh: true

        # Step 2e: Prior Auth pipeline (depends on data generation)
        - task_key: prior_auth_pipeline
          depends_on:
            - task_key: data_generation
          pipeline_task:
            pipeline_id: ${resources.pipelines.prior_auth_pipeline.id}
            full_refresh: true

        # Step 2f: Network Adequacy pipeline (derived domain — geocoded providers/members + claims network)
        - task_key: network_adequacy_pipeline
          depends_on:
            - task_key: data_generation
            - task_key: providers_pipeline
            - task_key: members_pipeline
            - task_key: claims_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.network_pipeline.id}
            full_refresh: true

        # Step 2g: Care Management pipeline (standalone — only needs data generation)
        - task_key: care_management_pipeline
          depends_on:
            - task_key: data_generation
          pipeline_task:
            pipeline_id: ${resources.pipelines.care_management_pipeline.id}
            full_refresh: true

        # Step 2h: Seed initial ADT events so Autoloader has data for schema inference
        - task_key: seed_adt_feed
          depends_on:
            - task_key: data_generation
            - task_key: setup_lakebase
          notebook_task:
            notebook_path: ../src/notebooks/generate_adt_feed.py
            base_parameters:
              catalog: ${var.catalog}
              events_per_batch: "50"
              lakebase_project_id: ${var.lakebase_project_id}
          environment_key: bootstrap_env

        - task_key: adt_pipeline
          depends_on:
            - task_key: seed_adt_feed
          pipeline_task:
            pipeline_id: ${resources.pipelines.adt_pipeline.id}
            full_refresh: true

        # Step 2i: FWA pipeline (derived domain — needs members + claims for cross-schema gold joins)
        - task_key: fwa_pipeline
          depends_on:
            - task_key: data_generation
            - task_key: members_pipeline
            - task_key: claims_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.fwa_pipeline.id}
            full_refresh: true

        # Step 3: Gold analytics (depends on ALL domain pipelines + member months + FWA + network)
        - task_key: gold_analytics_pipeline
          depends_on:
            - task_key: members_pipeline
            - task_key: providers_pipeline
            - task_key: claims_pipeline
            - task_key: clinical_pipeline
            - task_key: underwriting_pipeline
            - task_key: risk_adjustment_pipeline
            - task_key: build_member_months
            - task_key: fwa_pipeline
            - task_key: network_adequacy_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.gold_analytics_pipeline.id}
            full_refresh: true

        # Step 3b: Create metric views (governed semantic layer on gold tables)
        # Requires DBR 17.2+ for CREATE VIEW ... WITH METRICS support
        - task_key: create_metric_views
          depends_on:
            - task_key: gold_analytics_pipeline
            - task_key: build_member_months
          notebook_task:
            notebook_path: ../src/notebooks/create_metric_views.py
            base_parameters:
              catalog: ${var.catalog}


        # Step 3b-2: Seed governed pricing-factor table (Underwriting Sim rate build-up).
        # Static actuarial reference data → a governed UC Delta table, not an SDP view.
        - task_key: build_pricing_factors
          depends_on:
            - task_key: gold_analytics_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/build_pricing_factors.py
            base_parameters:
              catalog: ${var.catalog}


        # Step 3c: Online Feature Store for low-latency agent lookups (<10ms vs 1-3s SQL warehouse)
        - task_key: setup_online_tables
          depends_on:
            - task_key: gold_analytics_pipeline
            - task_key: providers_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/setup_online_tables.py
            base_parameters:
              catalog: ${var.catalog}
              lakebase_project_id: ${var.lakebase_project_id}
          environment_key: feature_store_env


        # Step 3d: Register UC tool functions in ai_tools schema
        - task_key: create_uc_tools
          depends_on:
            - task_key: gold_analytics_pipeline
            - task_key: care_management_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/create_uc_tools.py
            base_parameters:
              catalog: ${var.catalog}


        # Step 4: Vector Search index (depends on documents pipeline)
        - task_key: setup_vector_search
          depends_on:
            - task_key: documents_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/setup_vector_search.py
            base_parameters:
              catalog: ${var.catalog}


        # Step 5: Register Care Intelligence Agent in Unity Catalog (depends on vector search + gold analytics)
        - task_key: deploy_member_agent
          depends_on:
            - task_key: setup_vector_search
            - task_key: gold_analytics_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/deploy_member_agent.py
            base_parameters:
              catalog: ${var.catalog}

          environment_key: agent_env

        # Step 6: Register Care Intelligence Agent v2 (depends on vector search + gold analytics + benefits)
        - task_key: deploy_agent_v2
          depends_on:
            - task_key: setup_vector_search
            - task_key: gold_analytics_pipeline
            - task_key: benefits_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/deploy_agent_v2.py
            base_parameters:
              catalog: ${var.catalog}

          environment_key: agent_env

        # Step 6b: Register Group Sales Coach Agent (depends on gold analytics)
        - task_key: deploy_group_sales_agent
          depends_on:
            - task_key: gold_analytics_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/deploy_group_sales_agent.py
            base_parameters:
              catalog: ${var.catalog}

          environment_key: agent_env

        # Step 6c: Train FWA fraud scoring model with XGBoost
        - task_key: train_fwa_model
          depends_on:
            - task_key: fwa_pipeline
            - task_key: gold_analytics_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/train_fwa_model.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: ml_training_env

        # Step 6d: Deploy FWA Investigation Agent
        - task_key: deploy_fwa_agent
          depends_on:
            - task_key: gold_analytics_pipeline
            - task_key: fwa_pipeline
            - task_key: train_fwa_model
            - task_key: setup_medical_policy_vs
          notebook_task:
            notebook_path: ../src/notebooks/deploy_fwa_agent.py
            base_parameters:
              catalog: ${var.catalog}

          environment_key: agent_env

        # Step 6d-i: Medical policy Vector Search index for FWA agent RAG
        # Reads PDFs directly from the UC volume (written by data_generation)
        - task_key: setup_medical_policy_vs
          depends_on:
            - task_key: data_generation
            - task_key: prior_auth_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/setup_medical_policy_vs.py
            base_parameters:
              catalog: ${var.catalog}

        # Step 6d-i-b: Plan-document Vector Search index for the Group Reporting Sales Coach RAG
        - task_key: setup_plan_docs_vs
          depends_on:
            - task_key: gold_analytics_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/setup_plan_docs_vs.py
            base_parameters:
              catalog: ${var.catalog}

        # Step 6d-i-c: Governed Group Reporting tables (competitive benchmarks + renewal-scenario write-back)
        - task_key: build_group_reporting_tables
          depends_on:
            - task_key: gold_analytics_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/build_group_reporting_tables.py
            base_parameters:
              catalog: ${var.catalog}

        # Step 6d-ii: AI Gateway external model endpoints (runs in parallel, no dependencies)
        - task_key: setup_ai_gateway
          notebook_task:
            notebook_path: ../src/notebooks/setup_ai_gateway.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: agent_env

        # Step 6e: Train Prior Auth ML model
        - task_key: train_pa_model
          depends_on:
            - task_key: prior_auth_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/train_pa_model.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: ml_training_env

        # Step 6f: Deploy Prior Auth Agent
        - task_key: deploy_pa_agent
          depends_on:
            - task_key: prior_auth_pipeline
            - task_key: train_pa_model
          notebook_task:
            notebook_path: ../src/notebooks/deploy_pa_agent.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: agent_env

        # Step 6g: Parse medical policy documents for PA agent RAG
        - task_key: parse_medical_policies
          depends_on:
            - task_key: prior_auth_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/parse_medical_policies.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: agent_env

        # Step 6h: PA model governance (monitoring, drift detection)
        - task_key: pa_model_governance
          depends_on:
            - task_key: train_pa_model
          notebook_task:
            notebook_path: ../src/notebooks/pa_model_governance.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: ml_training_env

        # Step 6d-iii: Evaluate FWA agent across multiple models
        - task_key: evaluate_fwa_agent
          depends_on:
            - task_key: deploy_fwa_agent
            - task_key: setup_ai_gateway
          notebook_task:
            notebook_path: ../src/notebooks/evaluate_fwa_agent.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: agent_eval_env

        # Step 6d-iv: Materialize MLflow traces to UC for SQL queryability
        - task_key: materialize_traces
          depends_on:
            - task_key: evaluate_fwa_agent
          notebook_task:
            notebook_path: ../src/notebooks/materialize_traces.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: agent_env

        # Step 7: Evaluate v1 vs v2 agents (depends on both being registered)
        - task_key: evaluate_agents
          depends_on:
            - task_key: deploy_member_agent
            - task_key: deploy_agent_v2
          notebook_task:
            notebook_path: ../src/notebooks/evaluate_agents.py
            base_parameters:
              catalog: ${var.catalog}

          environment_key: agent_eval_env

        # Step 7b: Care Agent Evaluation Suite (MLflow GenAI scorers)
        - task_key: evaluate_care_agent
          depends_on:
            - task_key: deploy_agent_v2
          notebook_task:
            notebook_path: ../src/notebooks/evaluate_care_agent.py
            base_parameters:
              catalog: ${var.catalog}

          environment_key: agent_eval_env

        # Step 7c: Apply UC governance — row filters & column masks on PHI tables
        - task_key: setup_uc_governance
          depends_on:
            - task_key: gold_analytics_pipeline
            - task_key: members_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/setup_uc_governance.py
            base_parameters:
              catalog: ${var.catalog}

        # Step 8: Bootstrap workspace — grants, Genie spaces, seed operational data
        - task_key: bootstrap_workspace
          depends_on:
            - task_key: setup_lakebase
            - task_key: gold_analytics_pipeline
            - task_key: create_metric_views
            - task_key: create_uc_tools
            - task_key: fwa_pipeline
            - task_key: train_fwa_model
            - task_key: deploy_fwa_agent
            - task_key: setup_vector_search
            - task_key: network_adequacy_pipeline
            - task_key: prior_auth_pipeline
            - task_key: care_management_pipeline
            - task_key: adt_pipeline
            - task_key: setup_uc_governance
            - task_key: build_group_reporting_tables
          notebook_task:
            notebook_path: ../src/notebooks/bootstrap_workspace.py
            base_parameters:
              catalog: ${var.catalog}
              warehouse_id: ${var.warehouse_id}
              lakebase_project_id: ${var.lakebase_project_id}
          environment_key: bootstrap_env

        # Step 9: Deploy app source code and start compute
        - task_key: deploy_app_source
          depends_on:
            - task_key: bootstrap_workspace
          notebook_task:
            notebook_path: ../src/notebooks/deploy_app_source.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: app_deploy_env

      environments:
        - environment_key: agent_env
          spec:
            client: "1"
            dependencies:
              - mlflow==3.8.1
        - environment_key: agent_eval_env
          spec:
            client: "1"
            dependencies:
              - mlflow==3.8.1
        - environment_key: ml_training_env
          spec:
            client: "1"
            dependencies:
              - xgboost==3.1.1
              - shap==0.46.0
              - mlflow==3.8.1
              - databricks-feature-engineering==0.13.0.1
        - environment_key: lakebase_env
          spec:
            client: "1"
            dependencies:
              - psycopg[binary]
              - databricks-sdk>=0.30.0
        - environment_key: bootstrap_env
          spec:
            client: "1"
            dependencies:
              - psycopg[binary]
              - databricks-sdk>=0.30.0
              # Required by STEP 3b (provision UC trace storage for the FWA
              # agent): the mlflow.entities.UnityCatalog trace_location API
              # only exists in mlflow >= 3.14.
              - mlflow>=3.14.0
        - environment_key: feature_store_env
          spec:
            client: "1"
            dependencies:
              - databricks-feature-engineering==0.13.0.1
        - environment_key: app_deploy_env
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.30.0

      tags:
        project: red-bricks-insurance
        domain: full_demo
