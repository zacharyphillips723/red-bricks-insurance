resources:
  apps:
    red_bricks_network_adequacy_portal:
      name: "rb-network-adequacy-app"
      description: "Red Bricks Insurance — Network Adequacy Portal"
      source_code_path: ../app-network-adequacy
      config:
        command:
          - uvicorn
          - main:app
          - --host=0.0.0.0
          - --port=8000
        env:
          - name: GENIE_SPACE_ID
            value: auto
          - name: SQL_WAREHOUSE_ID
            value: ${var.warehouse_id}
          - name: UC_CATALOG
            value: ${var.catalog}
          - name: UC_SCHEMA
            value: network
          - name: LLM_ENDPOINT
            value: databricks-llama-4-maverick
          - name: NET_AGENT_ENDPOINT
            value: databricks-claude-haiku-4-5
          - name: MLFLOW_TRACKING_URI
            value: databricks
          - name: MLFLOW_UC_EXPERIMENT
            value: /Shared/red-bricks-network-agent-traces-uc
          - name: UC_TRACE_SCHEMA
            value: analytics
          - name: UC_TRACE_TABLE_PREFIX
            value: network_agent
      resources:
        - name: llm-endpoint
          serving_endpoint:
            name: databricks-llama-4-maverick
            permission: CAN_QUERY
        - name: net-agent-endpoint
          serving_endpoint:
            name: databricks-claude-haiku-4-5
            permission: CAN_QUERY
