resources:
  apps:
    red_bricks_command_center:
      name: "red-bricks-command-center-app"
      description: "Red Bricks Insurance — Population Health Command Center"
      source_code_path: ../app
      config:
        command:
          - uvicorn
          - main:app
          - --host=0.0.0.0
          - --port=8000
        env:
          - name: LAKEBASE_INSTANCE_NAME
            value: red-bricks-command-center
          - name: LAKEBASE_DATABASE_NAME
            value: red_bricks_alerts
          - name: GENIE_SPACE_ID
            value: auto
          - name: SQL_WAREHOUSE_ID
            value: ${var.warehouse_id}
          - name: LLM_ENDPOINT
            value: databricks-llama-4-maverick
          - name: UC_CATALOG
            value: ${var.catalog}
          - name: UC_SCHEMA
            value: analytics
      resources:
        - name: llm-endpoint
          serving_endpoint:
            name: databricks-llama-4-maverick
            permission: CAN_QUERY
        - name: embedding-endpoint
          serving_endpoint:
            name: databricks-bge-large-en
            permission: CAN_QUERY
        # Lakebase — provisions the security label so the app SP can authenticate via OAuth
        - name: lakebase-cc
          database:
            instance_name: red-bricks-command-center
            database_name: red_bricks_alerts
            permission: CAN_CONNECT_AND_CREATE
        # vector_search_index not yet supported as a DAB app resource
        # The app accesses vs index via SDK using its service principal
