resources:
  apps:
    red_bricks_uw_sim:
      name: "rb-uw-sim-${bundle.target}"
      description: "Red Bricks Insurance — Underwriting Simulation Portal"
      source_code_path: ../app-underwriting-sim
      config:
        command:
          - uvicorn
          - main:app
          - --host=0.0.0.0
          - --port=8000
        env:
          - name: LAKEBASE_PROJECT_ID
            value: ${var.lakebase_project_id}
          - name: LAKEBASE_DATABASE_NAME
            value: uw_sim
          - name: LAKEBASE_BRANCH
            value: production
          - name: GENIE_SPACE_ID
            value: auto
          - name: SQL_WAREHOUSE_ID
            value: ${var.warehouse_id}
          - name: LLM_ENDPOINT
            value: databricks-llama-4-maverick
          - name: UC_CATALOG
            value: ${var.catalog}
          - name: UC_SCHEMA
            value: analytics
      resources:
        - name: llm-endpoint
          serving_endpoint:
            name: databricks-llama-4-maverick
            permission: CAN_QUERY
        # Lakebase — SP access granted by bootstrap script (DAB doesn't support Autoscaling resource blocks yet)
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
