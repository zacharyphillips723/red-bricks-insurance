command:
  - uvicorn
  - main:app
  - --host=0.0.0.0
  - --port=8000

# SQL_WAREHOUSE_ID and UC_CATALOG default to "auto" (runtime auto-detection).
# When deployed via `databricks bundle deploy`, the DAB resource config
# (resources/app.yml) overrides with ${var.warehouse_id} and ${var.catalog}.
env:
  - name: LAKEBASE_INSTANCE_NAME
    value: red-bricks-command-center
  - name: LAKEBASE_DATABASE_NAME
    value: red_bricks_alerts
  - name: GENIE_SPACE_ID
    value: auto
  - name: SQL_WAREHOUSE_ID
    value: auto
  - name: LLM_ENDPOINT
    value: databricks-meta-llama-3-3-70b-instruct
  - name: UC_CATALOG
    value: auto
  - name: UC_SCHEMA
    value: analytics
