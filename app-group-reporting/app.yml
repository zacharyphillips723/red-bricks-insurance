command:
  - uvicorn
  - main:app
  - --host=0.0.0.0
  - --port=8000

# SQL_WAREHOUSE_ID and UC_CATALOG default to "auto" (runtime auto-detection).
# When deployed via `databricks bundle deploy`, the DAB resource config
# (resources/app_group_reporting.yml) overrides with ${var.warehouse_id}
# and ${var.catalog} from databricks.yml target variables.
env:
  - name: SQL_WAREHOUSE_ID
    value: auto
  - name: UC_CATALOG
    value: auto
  - name: LLM_ENDPOINT
    value: databricks-llama-4-maverick
  - name: UC_SCHEMA
    value: analytics
  - name: GENIE_SPACE_ID
    value: ""
  # Optional enrichment integrations — leave empty to disable
  - name: SLACK_BOT_TOKEN
    value: ""
  - name: GLEAN_API_TOKEN
    value: ""
  - name: GLEAN_API_URL
    value: ""
  - name: SF_INSTANCE_URL
    value: ""
  - name: SF_CLIENT_ID
    value: ""
  - name: SF_CLIENT_SECRET
    value: ""
  - name: SF_USERNAME
    value: ""
  - name: SF_PASSWORD
    value: ""
