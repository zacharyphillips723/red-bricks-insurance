command:
  - uvicorn
  - main:app
  - --host=0.0.0.0
  - --port=8000

# NOTE: SQL_WAREHOUSE_ID and UC_CATALOG are injected by DAB resource config
# (resources/app_group_reporting.yml) via ${var.warehouse_id} and ${var.catalog}.
# If not set, env_config.py auto-detects at runtime.
env:
  - name: LLM_ENDPOINT
    value: databricks-llama-4-maverick
  - name: UC_SCHEMA
    value: analytics
  - name: GENIE_SPACE_ID
    value: ""
  # Optional enrichment integrations — leave empty to disable
  - name: SLACK_BOT_TOKEN
    value: ""
  - name: GLEAN_API_TOKEN
    value: ""
  - name: GLEAN_API_URL
    value: ""
  - name: SF_INSTANCE_URL
    value: ""
  - name: SF_CLIENT_ID
    value: ""
  - name: SF_CLIENT_SECRET
    value: ""
  - name: SF_USERNAME
    value: ""
  - name: SF_PASSWORD
    value: ""
