command:
  - uvicorn
  - main:app
  - --host=0.0.0.0
  - --port=8000

env:
  - name: LAKEBASE_PROJECT_ID
    value: red-bricks-insurance
  - name: LAKEBASE_DATABASE_NAME
    value: uw_sim
  - name: LAKEBASE_BRANCH
    value: production
  - name: GENIE_SPACE_ID
    value: auto
  - name: SQL_WAREHOUSE_ID
    value: auto
  - name: LLM_ENDPOINT
    value: databricks-llama-4-maverick
  - name: UC_CATALOG
    value: auto
  - name: UC_SCHEMA
    value: analytics
