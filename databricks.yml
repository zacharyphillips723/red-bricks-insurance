# Red Bricks Insurance - Healthcare insurance company simulation
# Modular DAB: data generation can be run independently; pipelines added iteratively.
bundle:
  name: red-bricks-insurance

variables:
  source_volume:
    description: Volume path for raw generated source files
    default: /Volumes/red_bricks_insurance/raw/raw_sources
  warehouse_id:
    description: SQL warehouse for jobs (optional)
    default: ""
  node_type_small:
    description: Small node type (4 vCPU, 14GB) — Azure DS3_v2 or AWS m5.xlarge
    default: Standard_DS3_v2
  node_type_large:
    description: Large node type (16 vCPU, 56GB) — Azure DS5_v2 or AWS m5.4xlarge
    default: Standard_DS5_v2

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: fe-vm-red-bricks-insurance
    variables:
      warehouse_id: 781064a3466c0984

  e2-field-eng:
    mode: development
    workspace:
      profile: fe-demo-field-eng
    variables:
      warehouse_id: 03560442e95cb440
      node_type_small: m5.xlarge
      node_type_large: m5.4xlarge

  hls-financial:
    mode: development
    workspace:
      profile: hls-financial-foundation
    variables:
      warehouse_id: 8bfdf551dc136232
      node_type_small: m5.xlarge
      node_type_large: m5.4xlarge

  clinical-data-demo:
    mode: development
    workspace:
      profile: clinical-data-demo
    variables:
      warehouse_id: f7b1c2ddb43ad1b0
      node_type_small: m5.xlarge
      node_type_large: m5.4xlarge

  prod:
    mode: production
    workspace:
      profile: fe-vm-red-bricks-insurance
    variables:
      warehouse_id: 781064a3466c0984
