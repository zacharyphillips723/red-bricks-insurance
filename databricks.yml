# Red Bricks Insurance - Healthcare insurance company simulation
# Modular DAB: data generation can be run independently; pipelines added iteratively.
bundle:
  name: red-bricks-insurance

variables:
  catalog:
    description: Unity Catalog name for all pipelines, jobs, and apps
    default: red_bricks_insurance
  source_volume:
    description: Volume path for raw generated source files
    default: /Volumes/${var.catalog}/raw/raw_sources
  warehouse_id:
    description: SQL warehouse for dashboards — auto-resolves by name if not overridden
    lookup:
      warehouse: "Serverless Starter Warehouse"
  node_type_small:
    description: Small node type (4 vCPU, 14GB) — AWS m5.xlarge or Azure DS3_v2
    default: m5.xlarge
  node_type_large:
    description: Large node type (16 vCPU, 56GB) — AWS m5.4xlarge or Azure DS5_v2
    default: m5.4xlarge
  num_patients:
    description: Number of Synthea patients to generate (1000 for quick demos, 5000 for full)
    default: "5000"
  lakebase_project_id:
    description: Lakebase Autoscaling project ID
    default: red-bricks-insurance

sync:
  exclude:
    - "**/node_modules/**"

include:
  - resources/*.yml
  # Uncomment for classic-compute-enabled workspaces (adds standalone AutoML job):
  # - resources/classic/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: fe-vm-red-bricks-aws
    variables:
      catalog: red_bricks_insurance_catalog

  dev-azure:
    mode: development
    workspace:
      profile: fe-vm-red-bricks-insurance
    variables:
      node_type_small: Standard_DS3_v2
      node_type_large: Standard_DS5_v2

  e2-field-eng:
    mode: development
    workspace:
      profile: fe-demo-field-eng

  hls-financial:
    mode: development
    workspace:
      profile: hls-financial-foundation

  clinical-data-demo:
    mode: development
    workspace:
      profile: clinical-data-demo
    variables:
      catalog: clinical-data-demo

  red-bricks-demo:
    mode: development
    workspace:
      profile: fevm-red-bricks-demo
    variables:
      catalog: red_bricks_insurance_demo_catalog

  prod:
    mode: production
    workspace:
      profile: fe-vm-red-bricks-insurance
